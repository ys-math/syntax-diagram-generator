<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syntax Diagram Generator — EBNF → railroad diagrams</title>
    <meta
      name="description"
      content="Generate railroad syntax diagrams from EBNF (ISO/IEC 14977). SVG and TikZ output, runs entirely in your browser."
    />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">⛓</span>
        <h1>Syntax Diagram Generator</h1>
      </div>
      <div class="controls">
        <label class="field">
          <span>Dialect</span>
          <select id="dialect"></select>
        </label>
        <button id="theme-toggle" class="ghost" type="button" title="Toggle light/dark">◑</button>
      </div>
    </header>

    <main class="workspace">
      <section class="pane editor-pane">
        <div class="pane-head">
          <h2>Grammar</h2>
          <button id="sample-btn" class="ghost small" type="button">Load sample</button>
        </div>
        <textarea
          id="grammar"
          spellcheck="false"
          autocomplete="off"
          autocapitalize="off"
          placeholder="Type or paste an EBNF grammar…"
        ></textarea>
        <div id="error-banner" class="error-banner" hidden>
          <span id="error-text"></span>
          <button id="error-dismiss" class="ghost small" type="button" aria-label="Dismiss">✕</button>
        </div>
      </section>

      <section class="pane output-pane">
        <div class="pane-head">
          <h2>Diagrams</h2>
          <div class="output-actions">
            <button id="download-all" class="ghost small" type="button">Download all SVG</button>
            <button id="copy-all-tikz" class="ghost small" type="button">Copy all TikZ</button>
          </div>
        </div>
        <div id="diagrams" class="diagrams"></div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
