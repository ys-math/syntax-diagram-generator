<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syntax Diagram Generator — EBNF → railroad diagrams</title>
    <meta
      name="description"
      content="Generate railroad syntax diagrams from EBNF (ISO/IEC 14977). SVG and TikZ output, runs entirely in your browser."
    />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">⛓</span>
        <h1>Syntax Diagram Generator</h1>
      </div>
      <div class="controls">
        <label class="field">
          <span>Fit</span>
          <select id="fit-mode" title="How wide diagrams fit the LaTeX page">
            <option value="shrink">Shrink</option>
            <option value="wrap">Wrap</option>
          </select>
        </label>
        <label class="field" id="wrap-width-field" hidden>
          <span>Width (cm)</span>
          <input id="wrap-width" type="number" min="1" step="0.5" value="12.7" />
        </label>
        <button id="theme-toggle" class="ghost" type="button" title="Toggle light/dark">◑</button>
      </div>
    </header>

    <main class="workspace">
      <section class="pane editor-pane">
        <div class="pane-head">
          <h2>Grammar</h2>
          <div class="library-controls">
            <button id="save-btn" class="ghost small" type="button">Save</button>
            <div class="library-menu">
              <button
                id="saved-btn"
                class="ghost small"
                type="button"
                aria-haspopup="true"
                aria-expanded="false"
              >
                Saved ▾
              </button>
              <div id="library-popover" class="library-popover" hidden>
                <div class="library-popover-head">
                  <span>Saved grammars</span>
                  <div class="library-sort" role="group" aria-label="Sort saved grammars">
                    <button id="sort-recent" class="sort-tab" type="button">Recent</button>
                    <button id="sort-alpha" class="sort-tab" type="button">A–Z</button>
                  </div>
                </div>
                <ul id="library-list" class="library-list"></ul>
              </div>
            </div>
          </div>
        </div>
        <div class="editor">
          <div id="gutter" class="gutter" aria-hidden="true"></div>
          <textarea
            id="grammar"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="off"
            placeholder="Type or paste an EBNF grammar…"
          ></textarea>
        </div>
        <div id="error-banner" class="error-banner" hidden>
          <span id="error-text"></span>
          <button id="error-dismiss" class="ghost small" type="button" aria-label="Dismiss">✕</button>
        </div>
      </section>

      <div
        id="resizer"
        class="resizer"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize editor"
        tabindex="0"
        title="Drag to resize · double-click to reset"
      ></div>

      <section class="pane output-pane">
        <div class="pane-head">
          <h2>Diagrams</h2>
          <div class="output-actions">
            <button id="download-all" class="ghost small" type="button">Download all SVG</button>
            <button id="copy-all-tikz" class="ghost small" type="button">Copy all TikZ</button>
          </div>
        </div>
        <div id="diagrams" class="diagrams"></div>
      </section>
    </main>

    <dialog id="save-modal" class="modal">
      <form id="save-form" method="dialog" class="modal-body">
        <h2 class="modal-title">Save grammar</h2>
        <label class="modal-field">
          <span>Title</span>
          <input id="save-title" type="text" required maxlength="120" autocomplete="off" />
        </label>
        <label class="modal-field">
          <span>Description <em>(optional)</em></span>
          <textarea id="save-description" rows="3" maxlength="500"></textarea>
        </label>
        <p id="save-hint" class="modal-hint" hidden></p>
        <div class="modal-actions">
          <button type="button" id="save-cancel" class="ghost">Cancel</button>
          <button type="submit" id="save-confirm" class="ghost primary">Save</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
